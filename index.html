<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list diplomado</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <div class="app-container">
        <header>
            <div class="top-bar">
                <div class="profile-pic">
                    <span class="material-symbols-outlined">account_circle</span>
                </div>
            </div>
            <h1>Tasks</h1>
            <nav class="tabs">
                <button class="tab active">To-do list diplomado</button>
                <button class="tab add-list"><span class="material-symbols-outlined">add</span> New list</button>
            </nav>
        </header>

        <main>
            <div class="list-header">
                <h2>To-do list diplomado</h2>
                <div class="list-actions">
                    <button class="icon-btn"><span class="material-symbols-outlined">swap_vert</span></button>
                    <button class="icon-btn"><span class="material-symbols-outlined">more_vert</span></button>
                </div>
            </div>

            <ul id="task-list" class="task-list">
                <li class="task-item">
                    <div class="task-content">
                        <button class="check-btn"><span
                                class="material-symbols-outlined">radio_button_unchecked</span></button>
                        <span class="task-text">Así se ve una tarea</span>
                    </div>
                    <button class="star-btn"><span class="material-symbols-outlined">star_border</span></button>
                </li>
            </ul>
        </main>

        <div class="add-task-container">
            <div class="add-task-input-wrapper">
                <input type="text" id="new-task-input" placeholder="New task">
                <div class="add-task-actions">
                    <div class="left-actions">
                        <button class="icon-btn"><span class="material-symbols-outlined">sort</span></button>
                        <button class="icon-btn"><span class="material-symbols-outlined">schedule</span></button>
                        <button class="icon-btn"><span class="material-symbols-outlined">star_border</span></button>
                    </div>
                    <button id="save-task-btn" class="save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
